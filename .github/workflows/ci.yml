name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Performance budgets (doc 06 §7)
        run: npm run check:budgets

      # Lighthouse CI (métricas de campo do doc 06 §7) entra no marco de
      # SEO/performance, quando o pre-render existir para ser medido.
