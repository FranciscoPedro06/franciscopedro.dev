name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Performance budgets (doc 06 §7)
        run: npm run check:budgets

      # Acessibilidade/best-practices/SEO ≥ 0,95; performance ≥ 0,90 como
      # tripwire de regressão — o critério oficial do M7 (≥ 95, doc 07) se
      # mede no preview da Vercel (brotli + HTTP/2), não no servidor
      # estático do LHCI. Decisão registrada na revisão da Release 0.5.
      - name: Lighthouse CI (doc 06 §7)
        run: npx --yes @lhci/cli@0.15.x autorun
